# vkBasalt config — only active for games launched with ENABLE_VKBASALT=1
# ReShade shaders are symlinked from the nix store by modules/apps/steam.nix

# EFFECT CHAIN: SMAA for edges, CAS for clarity, Vibrance/Tonemap for colour
effects = smaa:cas:vib:tone

vib = /home/brandon/.config/vkBasalt/reshade/Shaders/Vibrance.fx
tone = /home/brandon/.config/vkBasalt/reshade/Shaders/Tonemap.fx
reshadeTexturePath = /home/brandon/.config/vkBasalt/reshade/Textures
reshadeIncludePath = /home/brandon/.config/vkBasalt/reshade/Shaders

# Toggle key (Home) to compare before/after
toggleKey = Home
enableOnLaunch = True

# --- SMAA (Highest Quality AA) ---
smaaEdgeDetection = luma
smaaThreshold = 0.05
smaaMaxSearchSteps = 32
smaaMaxSearchStepsDiag = 16
smaaCornerRounding = 25

# --- CAS (Contrast Adaptive Sharpening) ---
# 0.4 is the sweet spot; higher causes halos
casSharpness = 0.4

# ReShade shader parameters are keyed by the uniform names in the .fx files.
# Only scalar (float/int/bool) uniforms can be set here; float3 ones like
# VibranceRGBBalance and FogColor keep their .fx defaults.

# --- Vibrance (Subtle Color Boost) ---
Vibrance = 0.10

# --- Tonemap (Fog Reduction & Contrast) ---
# Defog subtracts FogColor (patched to neutral white in steam.nix) from the
# whole frame — keep it small or it crushes shadows. 0 disables it.
Defog = 0.05
Saturation = -0.15
Gamma = 1.0
