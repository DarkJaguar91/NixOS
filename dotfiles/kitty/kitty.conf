# Colors come from noctalia's kitty template when enabled in its settings.

font_family      UbuntuMono Nerd Font
font_size        12.0

# Each kitty window starts its own zellij session (fish inside, via $SHELL).
# Resume a dead or detached one with `zellij attach`, or run plain fish with
# `kitty -o shell=fish`.
shell            zellij
shell_integration enabled

scrollback_lines 10000
enable_audio_bell no
confirm_os_window_close 0

window_padding_width 4
cursor_trail     1

background_opacity 0.95
dynamic_background_opacity yes

tab_bar_edge     top
tab_bar_style    powerline

enabled_layouts  splits


# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
